<!doctype html>
<html lang="pt">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Entrar - Genii</title>

        <link rel="stylesheet" href="static/css/style.css?v=3" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
            rel="stylesheet"
        />

        <link
            rel="icon"
            href="static/img/favicon.ico?v=2"
            type="image/x-icon"
        />

        
        <script src="static/js/theme.js"></script>
    </head>
    <body data-page="login">
        <div class="split-container">
            <img src="static/img/cloud3.png" alt="" class="bg-image" />

            <div class="top-bar">
                <a href="index.html" class="brand-logo">
                    <img
                        src="static/img/geniilogo.png"
                        alt="Logo"
                        style="height: 35px"
                    />
                    <h1>Genii</h1>
                </a>
                <a href="register.html" class="btn-top-action">Criar Conta</a>
            </div>

            <div class="center-content">
                <img
                    src="static/img/wave.gif"
                    class="mascot-header"
                    alt="Genii Waving"
                />
                <h2>Bem-vindo de volta!</h2>

                <form id="loginForm" style="width: 100%">
                    <div class="form-group">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input
                            type="text"
                            id="email"
                            placeholder="Email ou nome de utilizador"
                            required
                        />
                    </div>

                    <div class="form-group">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input
                            type="password"
                            id="password"
                            placeholder="Palavra-passe"
                            required
                        />
                        <button
                            type="button"
                            class="toggle-password"
                            onclick="togglePasswordStyle()"
                        >
                            <i class="fa-solid fa-eye" id="eye-icon"></i>
                        </button>
                    </div>

                    <button type="submit" id="btnLogin" class="btn-submit">
                        ENTRAR
                    </button>
                    <a href="forgot.html" class="forgot-link"
                        >ESQUECESTE-TE DA SENHA?</a
                    >
                </form>

                <div class="divider"></div>
                <button type="button" id="btnGoogle" class="btn-google" onclick="handleGoogleLogin()">
                    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                    Continuar com o Google
                </button>
            </div>
        </div>

        <script>
            function togglePasswordStyle() {
                const input = document.getElementById("password");
                const icon = document.getElementById("eye-icon");
                if (input.type === "password") {
                    input.type = "text";
                    icon.classList.remove("fa-eye");
                    icon.classList.add("fa-eye-slash");
                } else {
                    input.type = "password";
                    icon.classList.remove("fa-eye-slash");
                    icon.classList.add("fa-eye");
                }
            }
        </script>

        <script type="module" src="static/js/components.js"></script>
        <script type="module" src="static/js/auth-login.js"></script>
    </body>
</html>
