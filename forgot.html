<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Genii</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <link rel="icon" href="static/img/favicon.ico?v=2" type="image/x-icon"/>


    
        <link rel="stylesheet" href="static/css/style.css?v=3" />
    <script src="static/js/theme.js"></script>
    </head>
<body data-page="forgot">


    <div class="card-container">
        
        <div id="form-view">
            <img src="static/img/key.gif" class="mascot-img" alt="Genii">
            <h2>Recuperar Conta</h2>
            <p class="subtitle">Introduza o seu e-mail para enviarmos um link mágico de recuperação.</p>


            <p id="msg-error" class="error-msg"></p>


            <form id="forgot-form">
                <div class="form-group">
                    <i class="fa-solid fa-envelope input-icon"></i>
                    <input type="email" id="email" placeholder="O seu e-mail" required>
                </div>
                <button class="btn-submit" type="submit" id="btnSend">ENVIAR LINK</button>
            </form>
        </div>


        <div id="success-view" class="success-view">
            <i class="fa-solid fa-envelope-circle-check" style="font-size: 5rem; color: var(--genii-teal); margin-bottom: 20px;"></i>
            <h2>E-mail Enviado!</h2>
            <p class="subtitle">Verifique a sua caixa de correio (e o spam). Enviámos um link para criar uma nova palavra-passe.</p>
            
            <a href="login.html" class="btn-submit" style="display: block; text-decoration: none; line-height: 1.5;">
                VOLTAR AO LOGIN
            </a>
        </div>


        <a href="login.html" class="back-link" id="back-link-bottom">Cancelar e voltar</a>


    </div>


    <script type="module">
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { auth } from "./firebase-config.js";


        const formView = document.getElementById('form-view');
        const successView = document.getElementById('success-view');
        const backLink = document.getElementById('back-link-bottom');
        const msgError = document.getElementById('msg-error');
        const btnSend = document.getElementById('btnSend');


        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;


            btnSend.innerText = "A ENVIAR...";
            btnSend.style.opacity = "0.7";
            msgError.style.display = 'none';


            try {
                await sendPasswordResetEmail(auth, email);
                
                formView.style.display = 'none';
                backLink.style.display = 'none';
                successView.style.display = 'block';


            } catch (error) {
                btnSend.innerText = "ENVIAR LINK";
                btnSend.style.opacity = "1";
                
                let errorMessage = "Ocorreu um erro. Tenta novamente.";
                if (error.code === 'auth/user-not-found') errorMessage = "Não encontrámos conta com este e-mail.";
                if (error.code === 'auth/invalid-email') errorMessage = "O e-mail não é válido.";


                msgError.innerText = errorMessage;
                msgError.style.display = 'block';
            }
        });
    </script>
</body>
</html>
